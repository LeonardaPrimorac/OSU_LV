<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
var svg = d3.select("body")
    .append("svg")
    .attr("width", 200)
    .attr("height", 700);

svg.append("rect")
    .attr("width", 100)
    .attr("height", 600)
    .attr("fill", "yellow")        
    .attr("stroke", "black")      
    .attr("stroke-width", 5)       
    .attr("fill-opacity", 0.5)   
    .attr("stroke-opacity", 1);  
</script>

</body>
</html>
