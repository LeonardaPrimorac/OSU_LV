<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
var svg = d3.select("body")
    .append("svg")
    .attr("width", 600)
    .attr("height", 400);

svg.append("rect")
    .attr("x", 0)

    .attr("height", 400)

 svg.append("ellipse")

svg.append("ellipse")

    .attr("fill", "gray");

svg.append("ellipse")
    .attr("cx", 210)

svg.append("rect")
    .attr("x", 230)

    .attr("width", 15)
    .attr("height", 70)
    .attr("fill", "darkred");

    .attr("points", "180,180 300,120 420,180")
    .attr("fill", "red");


svg.append("circle")
    .attr("cx", 290)
    .attr("cy", 260)
    .attr("r", 5)
    .attr("fill", "yellow");
</script>

</body>
</html>
