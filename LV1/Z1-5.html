<!DOCTYPE html>
<html>
<head>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<script>
var svg = d3.select("body")
    .append("svg")
    .attr("width", 400)
    .attr("height", 200);

function krug(x, y, boja) {
    svg.append("circle")
        .attr("cx", x)
        .attr("cy", y)
        .attr("r", 30)
        .attr("fill", "none")
        .attr("stroke", boja)
        .attr("stroke-width", 5);
}

krug(80, 80, "blue");
krug(150, 80, "black");
krug(220, 80, "red");

krug(115, 110, "yellow");
krug(185, 110, "green");

</script>

</body>
</html>
